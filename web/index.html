<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QFC Virtual Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      display: none;
    }
    #menu-screen {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #e0e0e0;
      gap: 20px;
    }
    #menu-screen h1 {
      font-size: 2.5rem;
      color: #00d4ff;
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
      margin-bottom: 10px;
    }
    #menu-screen h2 {
      font-size: 1.2rem;
      color: #888;
      margin-bottom: 30px;
      font-weight: normal;
    }
    .mode-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 420px;
      padding: 18px 24px;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    .mode-btn:hover:not(.disabled) {
      border-color: #00d4ff;
      background: #1a1a3e;
      transform: translateX(4px);
    }
    .mode-btn.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .mode-btn .icon { font-size: 1.8rem; }
    .mode-btn .label { font-weight: bold; color: #00d4ff; }
    .mode-btn .desc { color: #888; font-size: 0.85rem; }
    .mode-btn .tag {
      margin-left: auto;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 4px;
      background: #0f3460;
    }
    .mode-btn .tag.active { background: #00d4ff; color: #1a1a2e; }
    .mode-btn .tag.soon { background: #333; color: #666; }

    #name-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #name-modal.show { display: flex; }
    #name-modal .modal-box {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
    }
    #name-modal input {
      margin-top: 16px;
      padding: 10px 16px;
      background: #1a1a2e;
      border: 2px solid #0f3460;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      width: 260px;
      outline: none;
    }
    #name-modal input:focus { border-color: #00d4ff; }
    #name-modal button {
      margin-top: 16px;
      padding: 10px 24px;
      background: #00d4ff;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      .mode-btn { width: 90vw; }
      #menu-screen h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div id="chain-bar" style="position:fixed;top:0;left:0;right:0;height:32px;background:#111;display:flex;align-items:center;justify-content:space-between;padding:0 12px;font-size:0.75rem;color:#666;z-index:1000;border-bottom:1px solid #222;">
    <span>QFC Testnet ⛓️ Block <span id="chain-block">#---</span></span>
    <div>
      <span id="wallet-info" style="display:none;margin-right:8px;color:#6e6;"><span id="wallet-addr"></span> | <span id="wallet-bal"></span> QFC</span>
      <button id="btn-connect-wallet" style="padding:2px 10px;border:1px solid #444;border-radius:4px;background:#1a1a2e;color:#aaa;cursor:pointer;font-size:0.75rem;">🔗 Connect Wallet</button>
    </div>
  </div>
  <div id="menu-screen" style="margin-top:32px;">
    <h1>🏢 QFC Virtual Office</h1>
    <h2>Select your mode:</h2>
    <button class="mode-btn" id="btn-casual">
      <span class="icon">☕</span>
      <div>
        <div class="label">Casual</div>
        <div class="desc">Terminal Mode (v1.0)</div>
      </div>
      <span class="tag">CLI</span>
    </button>
    <button class="mode-btn" id="btn-normal">
      <span class="icon">⚔️</span>
      <div>
        <div class="label">Normal</div>
        <div class="desc">2D Pixel Art (v2.0)</div>
      </div>
      <span class="tag active">Enter</span>
    </button>
    <button class="mode-btn" id="btn-hardcore" onclick="window.location.href='/3d/'">
      <span class="icon">💀</span>
      <div>
        <div class="label">Hardcore</div>
        <div class="desc">3D Immersive (v3.0)</div>
      </div>
      <span class="tag active">Enter</span>
    </button>
  </div>

  <div id="name-modal">
    <div class="modal-box">
      <div style="font-size: 1.5rem; margin-bottom: 8px;">👤 Who are you?</div>
      <div style="color: #888; font-size: 0.85rem;">Enter your name or pick a team member</div>
      <div><input id="name-input" type="text" placeholder="e.g. Larry Lai" list="member-list" autofocus /></div>
      <datalist id="member-list"></datalist>
      <div><button id="name-submit">Enter Office</button></div>
    </div>
  </div>

  <div id="game-container"></div>

  <script type="module" src="/client/main.ts"></script>
</body>
</html>
