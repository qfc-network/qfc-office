name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-cli:
    name: Build CLI (v1.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build

  build-web:
    name: Build Web (v2.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd web && npm ci
      - run: cd web && npm run build:check
      - run: cd web && npm run build

  build-web3d:
    name: Build 3D (v3.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd web3d && npm ci
      - run: cd web3d && npm run build
